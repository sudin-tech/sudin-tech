<svg xmlns="http://www.w3.org/2000/svg" width="860" height="230"
     viewBox="0 0 860 230" role="img"
     aria-label="GitHub stats for Sudin Rai">

  <title>GitHub Stats — Sudin Rai</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#3FB950"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="860" height="230" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="230" fill="url(#bg)" clip-path="url(#round)" rx="12"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="860" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262D" stroke-width="0.4"/>
  </pattern>
  <rect width="860" height="230" fill="url(#grid)" opacity="0.35" clip-path="url(#round)"/>

  <!-- Header: name + tag -->
  <text x="40" y="46"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="11" font-weight="600" fill="#58A6FF"
        letter-spacing="3">GITHUB STATS</text>

  <text x="40" y="74"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="20" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">Sudin Rai</text>

  <!-- Top lang badge -->
  <rect x="700" y="38" width="120" height="26" rx="5"
        fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="760" y="55.5" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" fill="#8B949E" letter-spacing="1.5">TOP LANG</text>
  <text x="820" y="55.5" text-anchor="end"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="10" font-weight="700" fill="#3FB950" letter-spacing="0.5">JavaScript</text>

  <!-- Separator -->
  <line x1="40" y1="92" x2="820" y2="92" stroke="#21262D" stroke-width="1"/>

  <!-- Stat cells -->
  
  <!-- COMMITS -->
  <text x="105.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">41</text>
  <text x="105.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">COMMITS</text>
  <text x="105.0" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="8" fill="#484F58">this year</text>
  <!-- STARS -->
  <text x="235.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">0</text>
  <text x="235.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">STARS</text>
  <text x="235.0" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="8" fill="#484F58">earned</text>
  <!-- PULL REQ -->
  <text x="365.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">0</text>
  <text x="365.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">PULL REQ</text>
  <text x="365.0" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="8" fill="#484F58">opened</text>
  <!-- REPOS -->
  <text x="495.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">12</text>
  <text x="495.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">REPOS</text>
  <text x="495.0" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="8" fill="#484F58">public</text>
  <!-- FORKS -->
  <text x="625.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">0</text>
  <text x="625.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">FORKS</text>
  <text x="625.0" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="8" fill="#484F58">total</text>
  <!-- FOLLOWERS -->
  <text x="755.0" y="118" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="26" font-weight="700" fill="#E6EDF3"
        letter-spacing="-0.5">5</text>
  <text x="755.0" y="143" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="600" fill="#8B949E"
        letter-spacing="2">FOLLOWERS</text>

  <!-- Vertical dividers -->
  <line x1="170.0" y1="100" x2="170.0" y2="170" stroke="#21262D" stroke-width="1"/><line x1="300.0" y1="100" x2="300.0" y2="170" stroke="#21262D" stroke-width="1"/><line x1="430.0" y1="100" x2="430.0" y2="170" stroke="#21262D" stroke-width="1"/><line x1="560.0" y1="100" x2="560.0" y2="170" stroke="#21262D" stroke-width="1"/><line x1="690.0" y1="100" x2="690.0" y2="170" stroke="#21262D" stroke-width="1"/>

  <!-- Bottom separator -->
  <line x1="40" y1="178" x2="820" y2="178" stroke="#21262D" stroke-width="1"/>

  <!-- Footer -->
  <text x="40" y="205"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" fill="#484F58">↻ Updated May 15, 2026 · 04:36 UTC</text>

  <text x="820" y="205" text-anchor="end"
        font-family="'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" fill="#484F58">2026 contributions</text>

</svg>
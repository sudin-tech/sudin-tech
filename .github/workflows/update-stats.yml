name: Update GitHub Stats

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: # Allow manual trigger from Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/generate_stats.py"

permissions:
  contents: write # Needed to commit the generated SVG

jobs:
  generate-stats:
    name: Generate Stats SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate stats SVG
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTPUT_FILE: stats/github-stats.svg
        run: python scripts/generate_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add stats/github-stats.svg

          # Only commit when the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to stats — skipping commit."
          else
            git commit -m "chore: update github stats [skip ci]"
            git push
          fi
